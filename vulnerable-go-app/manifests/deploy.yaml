apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-go-app
  labels:
    app: vulnerable-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable-app
  template:
    metadata:
      labels:
        app: vulnerable-app
    spec:
      containers:
      - name: webapp
        image: peachycloudsecurity/vulnerable-go-app:latest
        ports:
        - containerPort: 8080
        securityContext:
          # K01: Running as Privileged (EXTREMELY VULNERABLE)
          privileged: true
          runAsUser: 0
---
apiVersion: v1
kind: Service
metadata:
  name: vulnerable-app-service
spec:
  selector:
    app: vulnerable-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: NodePort
